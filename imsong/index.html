<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Hangul Particle Flow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script>
        /**
         * Hangul Particle Flow
         * Floating Hangul consonants with Perlin noise that shatter into dust on click.
         */

        let particles = [];
        let dustParticles = [];
        const numParticles = 400; // 성능 조절용 (글자 렌더링은 선형보다 무거움)
        let noiseScale = 0.005;
        const hangulChars = ['임', '송', '이'];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            background(0);
            textAlign(CENTER, CENTER);

            for (let i = 0; i < numParticles; i++) {
                let p = new Particle();
                // 처음엔 화면 무작위 위치에 생성
                p.pos = createVector(random(width), random(height));
                particles.push(p);
            }
        }

        function draw() {
            background(0, 30); // 약간의 잔상 효과

            // 마우스 위치에 따른 흐름 속도 조절
            let speedFactor = map(dist(mouseX, mouseY, width / 2, height / 2), 0, width / 2, 1, 3);

            // 먼지 입자(가루) 업데이트 및 그리기
            for (let i = dustParticles.length - 1; i >= 0; i--) {
                let d = dustParticles[i];
                d.update();
                d.display();
                if (d.isDead()) {
                    dustParticles.splice(i, 1);
                }
            }

            // 한글 입자 업데이트 및 그리기
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(speedFactor);
                p.show();

                // 산산조각 났다면 새로운 입자로 대체
                if (p.shattered) {
                    particles.splice(i, 1);
                    particles.push(new Particle());
                }
            }
        }

        class Dust {
            constructor(x, y, colorHue) {
                this.pos = createVector(x, y);
                // 무작위 방향으로 폭발
                this.vel = p5.Vector.random2D().mult(random(2, 6));
                this.acc = createVector(0, 0.1); // 약간의 중력
                this.life = 255;
                this.size = random(2, 6);
                this.colorHue = colorHue; // HSB 기준 색상
            }

            update() {
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.life -= random(4, 10);
            }

            display() {
                noStroke();
                colorMode(HSB);
                // Pastel colors: low saturation (40-60) and high brightness (90-100%)
                fill(this.colorHue, 50, 100, this.life / 255);
                ellipse(this.pos.x, this.pos.y, this.size);
                colorMode(RGB); // 다른 렌더링을 위해 복구
            }

            isDead() {
                return this.life <= 0;
            }
        }

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                // 캔버스 밖에서 스폰되도록 처리 (자연스럽게 흘러들어오게 함)
                let spawnEdge = floor(random(4));
                if (spawnEdge === 0) this.pos = createVector(random(width), -50); // Top
                else if (spawnEdge === 1) this.pos = createVector(width + 50, random(height)); // Right
                else if (spawnEdge === 2) this.pos = createVector(random(width), height + 50); // Bottom
                else this.pos = createVector(-50, random(height)); // Left

                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = random(0.5, 2.5);

                this.char = random(hangulChars);
                this.size = random(15, 35); // 글자 크기
                this.rotation = random(TWO_PI);
                this.rotationSpeed = random(-0.05, 0.05);

                this.colorHue = random(360);
                this.shattered = false;
            }

            update(speedFactor) {
                if (this.shattered) return;

                // Perlin Noise 기반 흐름장
                let angle = noise(this.pos.x * noiseScale, this.pos.y * noiseScale, frameCount * 0.005) * TWO_PI * 4;
                let force = p5.Vector.fromAngle(angle);
                force.mult(0.5);
                this.applyForce(force);

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed * speedFactor);
                this.pos.add(this.vel);
                this.acc.mult(0);

                this.rotation += this.rotationSpeed;

                // 화면 밖으로 멀리 나가면 다시 초기화
                let margin = 100;
                if (this.pos.x < -margin || this.pos.x > width + margin ||
                    this.pos.y < -margin || this.pos.y > height + margin) {
                    this.init();
                }
            }

            applyForce(f) {
                this.acc.add(f);
            }

            shatter() {
                this.shattered = true;
                let amount = floor(random(15, 30)); // 가루(Dust) 개수
                for (let i = 0; i < amount; i++) {
                    dustParticles.push(new Dust(this.pos.x, this.pos.y, this.colorHue));
                }
            }

            show() {
                if (this.shattered) return;

                push();
                translate(this.pos.x, this.pos.y);
                rotate(this.rotation);

                colorMode(HSB);
                // Pastel colors for main particles
                fill(this.colorHue, 60, 95, 0.82);
                noStroke();
                textSize(this.size);
                text(this.char, 0, 0);
                colorMode(RGB);

                pop();
            }
        }

        // 클릭하면 근처 입자를 산산조각 냄
        function mousePressed() {
            shatterParticlesNear(mouseX, mouseY);
        }

        // 모바일 터치 대응
        function touchStarted() {
            if (touches.length > 0) {
                shatterParticlesNear(touches[0].x, touches[0].y);
                return false; // 브라우저 기본 터치 동작(스크롤 등) 방지
            }
        }

        function shatterParticlesNear(x, y) {
            for (let p of particles) {
                let d = dist(x, y, p.pos.x, p.pos.y);
                if (d < 120 && !p.shattered) { // 터치/클릭 반경 120 픽셀 내의 자음들을 부숨
                    p.shatter();
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background(0);
        }
    </script>
</body>

</html>
